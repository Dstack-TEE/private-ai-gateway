# Example trusted-workload-launcher config that boots Private AI Gateway
# from this repo at a pinned commit. The gateway's repo-owned entry script
# lives at ./entrypoint.sh in the public repo root.
#
# The launcher fetches REPO_URL at COMMIT_SHA, verifies HEAD after checkout,
# then runs our entry script. Trust-bearing fields here are REPO_URL and
# COMMIT_SHA.
#
# CHILD_ENV_FILE carries deployment policy (bind address, upstream config
# path, admin token, source-provenance arms surfaced in the attestation
# report). The launcher
# parses that file the same way it parses this one - line by line, not via
# `source` - and exports each KEY=VALUE into entrypoint.sh's environment.
# CHILD_ENV_FILE is not part of the trust pin in the strict sense, but a
# verifier MUST audit it the same way it audits this config: anything the
# aggregator surfaces in its attestation report (e.g. the source-provenance
# fields) flows from there.
#
# IMPORTANT: replace COMMIT_SHA with the full 40- or 64-hex hash of the
# revision you have actually audited. The launcher refuses to start with a
# branch, tag, or short SHA.

REPO_URL=https://github.com/Dstack-TEE/private-ai-gateway.git
COMMIT_SHA=0000000000000000000000000000000000000000
WORK_DIR=/var/lib/trusted-workload-launcher/private-ai-gateway
CHILD_ENV_FILE=/etc/trusted-workload-launcher/aggregator.env
