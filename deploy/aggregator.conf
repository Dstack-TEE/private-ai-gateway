# Example git-launcher config that boots Private AI Gateway
# from this repo at a pinned commit. The gateway's repo-owned entry script
# lives at ./entrypoint.sh in the public repo root.
#
# The launcher fetches REPO_URL at COMMIT_SHA, verifies HEAD after checkout,
# then runs our entry script. Trust-bearing fields here are REPO_URL and
# COMMIT_SHA.
#
# Non-secret runtime policy is normal Docker Compose environment. Secrets
# should come from dstack encrypted secrets, KMS, or mounted secret files, not
# from this launcher config.
#
# IMPORTANT: replace COMMIT_SHA with the full 40- or 64-hex hash of the
# revision you have actually audited. The launcher refuses to start with a
# branch, tag, or short SHA.

REPO_URL=https://github.com/Dstack-TEE/private-ai-gateway.git
COMMIT_SHA=0000000000000000000000000000000000000000
WORK_DIR=/var/lib/git-launcher/private-ai-gateway
